<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Boiro Sprites</title>
		<style>
			:root {
				color-scheme: light;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				background:
					radial-gradient(circle at 20% 15%, rgba(255, 239, 202, 0.9), transparent 35%),
					radial-gradient(circle at 85% 80%, rgba(182, 225, 255, 0.8), transparent 35%),
					linear-gradient(160deg, #f8f4ea, #dceef9 55%, #cde7fb);
				font-family: "Avenir Next", "Segoe UI", sans-serif;
			}

			.frame {
				width: min(96vw, 1280px);
				height: min(92vh, 760px);
				background: rgba(255, 255, 255, 0.7);
				border: 1px solid rgba(36, 65, 92, 0.15);
				border-radius: 16px;
				box-shadow: 0 24px 50px rgba(12, 47, 76, 0.2);
				backdrop-filter: blur(5px);
				overflow: hidden;
				display: grid;
			}

			canvas {
				width: 100%;
				height: 100%;
				display: block;
			}

			.status {
				position: fixed;
				left: 14px;
				bottom: 10px;
				padding: 6px 10px;
				border-radius: 999px;
				background: rgba(0, 0, 0, 0.66);
				color: #fff;
				font-size: 12px;
				letter-spacing: 0.02em;
			}
		</style>
	</head>
	<body>
		<main class="frame">
			<canvas id="scene" aria-label="Canvas de sprites"></canvas>
		</main>
		<output class="status" id="status">Cargando sprites...</output>

		<script type="module">
			const canvas = document.getElementById('scene');
			const ctx = canvas.getContext('2d');
			const statusEl = document.getElementById('status');

			function updateStatus(message) {
				statusEl.textContent = message;
			}

			function getSceneSize(items) {
				let width = 1;
				let height = 1;

				for (const item of items) {
					if (!item.bounds) continue;
					width = Math.max(width, item.bounds.x + item.bounds.width);
					height = Math.max(height, item.bounds.y + item.bounds.height);
				}

				return { width, height };
			}

			function fitCanvasToViewport() {
				const dpr = window.devicePixelRatio || 1;
				const rect = canvas.getBoundingClientRect();

				canvas.width = Math.max(1, Math.round(rect.width * dpr));
				canvas.height = Math.max(1, Math.round(rect.height * dpr));
				ctx.setTransform(1, 0, 0, 1, 0, 0);
				ctx.scale(dpr, dpr);
			}

			async function loadImage(src) {
				const img = new Image();
				img.decoding = 'async';
				img.src = src;

				await img.decode();
				return img;
			}

			async function main() {
				updateStatus('Leyendo posiciones...');
				const response = await fetch('./assets/sprites/positions.json');
				if (!response.ok) {
					throw new Error(`No se pudo cargar positions.json (${response.status})`);
				}

				const items = await response.json();

				if (!Array.isArray(items)) {
					throw new Error('El formato de posiciones no es un array');
				}

				const drawable = items.filter((item) => item.bounds);
				const sceneSize = getSceneSize(drawable);

				updateStatus(`Cargando ${drawable.length} imágenes...`);
				const loaded = await Promise.all(
					drawable.map(async (item) => {
						const img = await loadImage(`./assets/sprites/${item.file}`);
						return { ...item, img };
					}),
				);

				const render = () => {
					fitCanvasToViewport();

					const viewW = canvas.clientWidth;
					const viewH = canvas.clientHeight;
					const scale = Math.min(viewW / sceneSize.width, viewH / sceneSize.height);
					const offsetX = (viewW - sceneSize.width * scale) * 0.5;
					const offsetY = (viewH - sceneSize.height * scale) * 0.5;

					ctx.clearRect(0, 0, viewW, viewH);
					ctx.save();
					ctx.imageSmoothingEnabled = true;
					ctx.imageSmoothingQuality = 'high';
					ctx.translate(offsetX, offsetY);
					ctx.scale(scale, scale);

					for (const item of loaded) {
						const { x, y, width, height } = item.bounds;
						ctx.drawImage(item.img, x, y, width, height, x, y, width, height);
					}

					ctx.restore();
				};

				render();
				window.addEventListener('resize', render);
				updateStatus(`Listo: ${loaded.length} sprites dibujados`);
			}

			main().catch((error) => {
				console.error(error);
				updateStatus(`Error: ${error.message}`);
			});
		</script>
	</body>
</html>
